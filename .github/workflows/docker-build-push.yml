name: Build and push backend image

# Builds the workspace backend image on GitHub's runners (fast uplink to Docker
# Hub) so large layers never have to be pushed from a local/home connection.
# Triggers on pushes to main and can also be run manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!webrtc-mobile/**'   # mobile-only changes don't affect the server image
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: notaryan/rn-playground-backend:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
